org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Fix for 16KB page size compatibility warning
android.experimental.enableNativeCompression=true

# Fix for KSP ArrayIndexOutOfBoundsException (corrupted incremental cache)
ksp.incremental=false
